# Netlify configuration

# Strip index.html from URLs (redirect to clean URL)
[[redirects]]
  from = "/*/index.html"
  to = "/:splat/"
  status = 301
  force = true

# Redirect root to texts-index
[[redirects]]
  from = "/"
  to = "/texts-index.html"
  status = 200

# Enable Netlify Identity for Decap CMS
[build]
  publish = "."

# Pretty URLs - serve index.html for directories
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
