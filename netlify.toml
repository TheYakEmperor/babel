# Netlify configuration

# Redirect root to texts-index
[[redirects]]
  from = "/"
  to = "/texts-index.html"
  status = 200

# Enable Netlify Identity for Decap CMS
[build]
  publish = "."

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
