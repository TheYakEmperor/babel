<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Babel Archive</title>
    <link rel="icon" type="image/webp" href="/favicon.webp">
    <link rel="stylesheet" href="/style.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: var(--accent-color, #3b82f6);
            margin: 0;
            line-height: 1;
        }
        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0 2rem;
            color: var(--text-secondary, #666);
        }
        .error-link {
            padding: 0.75rem 1.5rem;
            background: var(--accent-color, #3b82f6);
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        .error-link:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <p class="error-code">404</p>
        <p class="error-message">This page has been lost to history.</p>
        <a href="/" class="error-link">Return to Archive</a>
    </div>
</body>
</html>
